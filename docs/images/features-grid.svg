<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" fill="none">
  <rect width="1200" height="360" fill="#F8F6F1"/>

  <!-- Card 1: Wrapped -->
  <rect x="40" y="30" width="350" height="300" rx="20" fill="#EDE9E3"/>
  <text x="70" y="70" font-family="'Courier New', monospace" font-size="9" fill="#A39E96" letter-spacing="2">YOUR YEAR</text>
  <text x="70" y="130" font-family="Georgia, serif" font-size="56" fill="#1A1A1A">5,847</text>
  <text x="70" y="155" font-family="'Courier New', monospace" font-size="10" fill="#A39E96">photos captured</text>

  <text x="70" y="195" font-family="'Courier New', monospace" font-size="9" fill="#A39E96" letter-spacing="1">TOP LENS</text>
  <text x="70" y="218" font-family="Georgia, serif" font-size="18" fill="#1A1A1A">35mm f/1.4 GM</text>
  <rect x="70" y="230" width="290" height="5" rx="2.5" fill="#D4CFC7"/>
  <rect x="70" y="230" width="185" height="5" rx="2.5" fill="#E8553D"/>

  <text x="70" y="270" font-family="'Courier New', monospace" font-size="9" fill="#A39E96" letter-spacing="1">ARCHETYPE</text>
  <text x="70" y="295" font-family="Georgia, serif" font-size="20" fill="#1A1A1A">The Bokeh Addict</text>
  <circle x="325" y="295" r="5" fill="#E8553D"/>

  <!-- Card 2: Analytics -->
  <rect x="420" y="30" width="350" height="300" rx="20" fill="#EDE9E3"/>
  <text x="450" y="70" font-family="'Courier New', monospace" font-size="9" fill="#A39E96" letter-spacing="2">ANALYTICS</text>

  <!-- Mini aperture chart -->
  <rect x="450" y="90" width="18" height="100" rx="3" fill="#D4CFC7"/>
  <rect x="474" y="70" width="18" height="120" rx="3" fill="#1A1A1A"/>
  <rect x="498" y="85" width="18" height="105" rx="3" fill="#1A1A1A"/>
  <rect x="522" y="100" width="18" height="90" rx="3" fill="#D4CFC7"/>
  <rect x="546" y="115" width="18" height="75" rx="3" fill="#D4CFC7"/>
  <rect x="570" y="130" width="18" height="60" rx="3" fill="#D4CFC7"/>
  <rect x="594" y="140" width="18" height="50" rx="3" fill="#D4CFC7"/>
  <rect x="618" y="150" width="18" height="40" rx="3" fill="#D4CFC7"/>
  <rect x="642" y="158" width="18" height="32" rx="3" fill="#D4CFC7"/>
  <rect x="666" y="165" width="18" height="25" rx="3" fill="#D4CFC7"/>

  <text x="450" y="215" font-family="Georgia, serif" font-size="14" fill="#1A1A1A">Aperture, ISO, Shutter Speed</text>
  <text x="450" y="240" font-family="system-ui, sans-serif" font-size="12" fill="#A39E96">Focal length heatmaps</text>
  <text x="450" y="260" font-family="system-ui, sans-serif" font-size="12" fill="#A39E96">Time-of-day patterns</text>
  <text x="450" y="280" font-family="system-ui, sans-serif" font-size="12" fill="#A39E96">Gear ROI calculator</text>
  <text x="450" y="300" font-family="system-ui, sans-serif" font-size="12" fill="#A39E96">GPS shot map</text>

  <!-- Card 3: Formats -->
  <rect x="800" y="30" width="360" height="300" rx="20" fill="#EDE9E3"/>
  <text x="830" y="70" font-family="'Courier New', monospace" font-size="9" fill="#A39E96" letter-spacing="2">FORMATS</text>
  <text x="830" y="110" font-family="Georgia, serif" font-size="42" fill="#1A1A1A">400+</text>
  <text x="830" y="135" font-family="system-ui, sans-serif" font-size="13" fill="#A39E96">camera formats supported</text>

  <!-- Format tags -->
  <rect x="830" y="155" width="45" height="26" rx="6" fill="#D4CFC7"/>
  <text x="841" y="172" font-family="'Courier New', monospace" font-size="10" fill="#1A1A1A">CR3</text>
  <rect x="882" y="155" width="45" height="26" rx="6" fill="#D4CFC7"/>
  <text x="893" y="172" font-family="'Courier New', monospace" font-size="10" fill="#1A1A1A">NEF</text>
  <rect x="934" y="155" width="48" height="26" rx="6" fill="#D4CFC7"/>
  <text x="945" y="172" font-family="'Courier New', monospace" font-size="10" fill="#1A1A1A">ARW</text>
  <rect x="989" y="155" width="48" height="26" rx="6" fill="#D4CFC7"/>
  <text x="1000" y="172" font-family="'Courier New', monospace" font-size="10" fill="#1A1A1A">DNG</text>
  <rect x="1044" y="155" width="50" height="26" rx="6" fill="#D4CFC7"/>
  <text x="1055" y="172" font-family="'Courier New', monospace" font-size="10" fill="#1A1A1A">HEIF</text>

  <rect x="830" y="188" width="45" height="26" rx="6" fill="#D4CFC7"/>
  <text x="841" y="205" font-family="'Courier New', monospace" font-size="10" fill="#1A1A1A">CR2</text>
  <rect x="882" y="188" width="45" height="26" rx="6" fill="#D4CFC7"/>
  <text x="893" y="205" font-family="'Courier New', monospace" font-size="10" fill="#1A1A1A">ORF</text>
  <rect x="934" y="188" width="48" height="26" rx="6" fill="#D4CFC7"/>
  <text x="945" y="205" font-family="'Courier New', monospace" font-size="10" fill="#1A1A1A">RW2</text>
  <rect x="989" y="188" width="48" height="26" rx="6" fill="#D4CFC7"/>
  <text x="1000" y="205" font-family="'Courier New', monospace" font-size="10" fill="#1A1A1A">RAF</text>
  <rect x="1044" y="188" width="50" height="26" rx="6" fill="#E8553D" opacity="0.15"/>
  <text x="1055" y="205" font-family="'Courier New', monospace" font-size="10" fill="#E8553D">AVIF</text>

  <text x="830" y="248" font-family="system-ui, sans-serif" font-size="12" fill="#A39E96">Canon, Nikon, Sony, Fuji,</text>
  <text x="830" y="268" font-family="system-ui, sans-serif" font-size="12" fill="#A39E96">Olympus, Panasonic, Leica,</text>
  <text x="830" y="288" font-family="system-ui, sans-serif" font-size="12" fill="#A39E96">Hasselblad, DJI, and more.</text>
</svg>
