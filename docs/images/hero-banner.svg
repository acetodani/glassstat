<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0d1525"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#36adf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#36adf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#36adf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#7cc8fc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGrad)"/>

  <!-- Glow effect -->
  <ellipse cx="600" cy="150" rx="400" ry="100" fill="url(#glowGrad)"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="75" x2="1200" y2="75" stroke="#1e1e2e" stroke-width="0.5"/>
  <line x1="0" y1="150" x2="1200" y2="150" stroke="#1e1e2e" stroke-width="0.5"/>
  <line x1="0" y1="225" x2="1200" y2="225" stroke="#1e1e2e" stroke-width="0.5"/>
  <line x1="300" y1="0" x2="300" y2="300" stroke="#1e1e2e" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="300" stroke="#1e1e2e" stroke-width="0.5"/>
  <line x1="900" y1="0" x2="900" y2="300" stroke="#1e1e2e" stroke-width="0.5"/>

  <!-- Decorative chart elements (background) -->
  <!-- Mini bar chart left -->
  <rect x="80" y="180" width="8" height="40" rx="2" fill="#36adf8" opacity="0.15"/>
  <rect x="93" y="170" width="8" height="50" rx="2" fill="#36adf8" opacity="0.15"/>
  <rect x="106" y="160" width="8" height="60" rx="2" fill="#36adf8" opacity="0.2"/>
  <rect x="119" y="175" width="8" height="45" rx="2" fill="#36adf8" opacity="0.15"/>
  <rect x="132" y="185" width="8" height="35" rx="2" fill="#36adf8" opacity="0.12"/>

  <!-- Mini chart right -->
  <rect x="1020" y="90" width="8" height="30" rx="2" fill="#7cc8fc" opacity="0.15"/>
  <rect x="1033" y="80" width="8" height="40" rx="2" fill="#7cc8fc" opacity="0.2"/>
  <rect x="1046" y="70" width="8" height="50" rx="2" fill="#7cc8fc" opacity="0.25"/>
  <rect x="1059" y="85" width="8" height="35" rx="2" fill="#7cc8fc" opacity="0.15"/>
  <rect x="1072" y="95" width="8" height="25" rx="2" fill="#7cc8fc" opacity="0.12"/>

  <!-- Lens icon -->
  <circle cx="520" cy="150" r="35" stroke="#36adf8" stroke-width="2" fill="none" opacity="0.6"/>
  <circle cx="520" cy="150" r="25" stroke="#36adf8" stroke-width="1.5" fill="none" opacity="0.4"/>
  <circle cx="520" cy="150" r="15" stroke="#36adf8" stroke-width="1" fill="none" opacity="0.3"/>
  <circle cx="520" cy="150" r="8" fill="#36adf8" opacity="0.5"/>

  <!-- Title -->
  <text x="580" y="140" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="url(#textGrad)">GlassStat</text>

  <!-- Subtitle -->
  <text x="580" y="175" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#9ca3af">Spotify Wrapped for your camera gear</text>

  <!-- Tags -->
  <rect x="580" y="195" width="70" height="22" rx="11" fill="#36adf8" opacity="0.15"/>
  <text x="595" y="210" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#36adf8">FastAPI</text>

  <rect x="658" y="195" width="60" height="22" rx="11" fill="#36adf8" opacity="0.15"/>
  <text x="673" y="210" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#36adf8">React</text>

  <rect x="726" y="195" width="70" height="22" rx="11" fill="#36adf8" opacity="0.15"/>
  <text x="738" y="210" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#36adf8">ExifTool</text>

  <rect x="804" y="195" width="55" height="22" rx="11" fill="#36adf8" opacity="0.15"/>
  <text x="815" y="210" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#36adf8">D3.js</text>

  <!-- Floating data points -->
  <circle cx="200" cy="80" r="3" fill="#36adf8" opacity="0.4"/>
  <circle cx="350" cy="60" r="2" fill="#7cc8fc" opacity="0.3"/>
  <circle cx="950" cy="240" r="3" fill="#36adf8" opacity="0.4"/>
  <circle cx="1100" cy="200" r="2" fill="#7cc8fc" opacity="0.3"/>
  <circle cx="150" cy="250" r="2" fill="#36adf8" opacity="0.3"/>
</svg>
