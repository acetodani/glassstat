<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none">
  <rect width="1200" height="320" fill="#F8F6F1"/>

  <!-- Subtle grid -->
  <line x1="0" y1="160" x2="1200" y2="160" stroke="#EDE9E3" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="320" stroke="#EDE9E3" stroke-width="1"/>

  <!-- Accent dot -->
  <circle cx="820" cy="100" r="8" fill="#E8553D"/>

  <!-- Title -->
  <text x="100" y="165" font-family="Georgia, serif" font-size="72" font-weight="400" fill="#1A1A1A" letter-spacing="-2">GlassStat</text>

  <!-- Subtitle -->
  <text x="100" y="205" font-family="'JetBrains Mono', monospace" font-size="14" fill="#A39E96" letter-spacing="1">YOUR YEAR IN PHOTOS</text>

  <!-- Decorative bars (representing focal length chart) -->
  <rect x="700" y="180" width="24" height="80" rx="4" fill="#D4CFC7"/>
  <rect x="732" y="155" width="24" height="105" rx="4" fill="#D4CFC7"/>
  <rect x="764" y="120" width="24" height="140" rx="4" fill="#1A1A1A"/>
  <rect x="796" y="140" width="24" height="120" rx="4" fill="#D4CFC7"/>
  <rect x="828" y="165" width="24" height="95" rx="4" fill="#D4CFC7"/>
  <rect x="860" y="190" width="24" height="70" rx="4" fill="#D4CFC7"/>
  <rect x="892" y="150" width="24" height="110" rx="4" fill="#E8553D" opacity="0.8"/>
  <rect x="924" y="195" width="24" height="65" rx="4" fill="#D4CFC7"/>
  <rect x="956" y="210" width="24" height="50" rx="4" fill="#D4CFC7"/>
  <rect x="988" y="225" width="24" height="35" rx="4" fill="#D4CFC7"/>

  <!-- X-axis labels -->
  <text x="706" y="278" font-family="'JetBrains Mono', monospace" font-size="9" fill="#A39E96">16</text>
  <text x="738" y="278" font-family="'JetBrains Mono', monospace" font-size="9" fill="#A39E96">24</text>
  <text x="770" y="278" font-family="'JetBrains Mono', monospace" font-size="9" fill="#A39E96">35</text>
  <text x="802" y="278" font-family="'JetBrains Mono', monospace" font-size="9" fill="#A39E96">50</text>
  <text x="834" y="278" font-family="'JetBrains Mono', monospace" font-size="9" fill="#A39E96">70</text>
  <text x="866" y="278" font-family="'JetBrains Mono', monospace" font-size="9" fill="#A39E96">85</text>
  <text x="894" y="278" font-family="'JetBrains Mono', monospace" font-size="9" fill="#A39E96">100</text>
  <text x="926" y="278" font-family="'JetBrains Mono', monospace" font-size="9" fill="#A39E96">135</text>
  <text x="958" y="278" font-family="'JetBrains Mono', monospace" font-size="9" fill="#A39E96">200</text>
  <text x="990" y="278" font-family="'JetBrains Mono', monospace" font-size="9" fill="#A39E96">400</text>

  <text x="700" y="296" font-family="'JetBrains Mono', monospace" font-size="10" fill="#A39E96">focal length (mm)</text>
</svg>
