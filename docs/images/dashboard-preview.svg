<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" fill="none">
  <rect width="1200" height="680" fill="#F8F6F1"/>

  <!-- Nav -->
  <text x="60" y="45" font-family="Georgia, serif" font-size="20" fill="#1A1A1A">GlassStat</text>
  <text x="1000" y="45" font-family="system-ui, sans-serif" font-size="13" fill="#A39E96">Overview</text>
  <text x="1070" y="45" font-family="system-ui, sans-serif" font-size="13" fill="#A39E96">Wrapped</text>
  <text x="1140" y="45" font-family="system-ui, sans-serif" font-size="13" fill="#A39E96">Import</text>

  <!-- Hero stats -->
  <text x="60" y="120" font-family="Georgia, serif" font-size="64" fill="#1A1A1A">12,847</text>
  <text x="60" y="145" font-family="'Courier New', monospace" font-size="10" fill="#A39E96" letter-spacing="2">TOTAL PHOTOS</text>

  <text x="340" y="120" font-family="Georgia, serif" font-size="64" fill="#1A1A1A">7</text>
  <text x="340" y="145" font-family="'Courier New', monospace" font-size="10" fill="#A39E96" letter-spacing="2">LENSES</text>

  <text x="480" y="120" font-family="Georgia, serif" font-size="64" fill="#1A1A1A">3</text>
  <text x="480" y="145" font-family="'Courier New', monospace" font-size="10" fill="#A39E96" letter-spacing="2">BODIES</text>

  <text x="620" y="120" font-family="Georgia, serif" font-size="64" fill="#1A1A1A">2020–24</text>
  <text x="620" y="145" font-family="'Courier New', monospace" font-size="10" fill="#A39E96" letter-spacing="2">YEARS</text>

  <!-- Focal Length section -->
  <text x="60" y="210" font-family="Georgia, serif" font-size="28" fill="#1A1A1A">Focal Length</text>
  <text x="250" y="210" font-family="system-ui, sans-serif" font-size="14" fill="#A39E96">where your eye goes</text>

  <!-- Chart card -->
  <rect x="60" y="230" width="1080" height="180" rx="20" fill="#EDE9E3"/>

  <!-- Bars -->
  <rect x="100" y="330" width="32" height="60" rx="4" fill="#D4CFC7"/>
  <rect x="150" y="300" width="32" height="90" rx="4" fill="#D4CFC7"/>
  <rect x="200" y="260" width="32" height="130" rx="4" fill="#1A1A1A"/>
  <rect x="250" y="280" width="32" height="110" rx="4" fill="#1A1A1A"/>
  <rect x="300" y="310" width="32" height="80" rx="4" fill="#D4CFC7"/>
  <rect x="350" y="325" width="32" height="65" rx="4" fill="#D4CFC7"/>
  <rect x="400" y="285" width="32" height="105" rx="4" fill="#E8553D"/>
  <rect x="450" y="320" width="32" height="70" rx="4" fill="#D4CFC7"/>
  <rect x="500" y="340" width="32" height="50" rx="4" fill="#D4CFC7"/>
  <rect x="550" y="355" width="32" height="35" rx="4" fill="#D4CFC7"/>

  <!-- Axis labels -->
  <text x="108" y="400" font-family="'Courier New', monospace" font-size="9" fill="#A39E96">16mm</text>
  <text x="158" y="400" font-family="'Courier New', monospace" font-size="9" fill="#A39E96">24mm</text>
  <text x="208" y="400" font-family="'Courier New', monospace" font-size="9" fill="#A39E96">35mm</text>
  <text x="258" y="400" font-family="'Courier New', monospace" font-size="9" fill="#A39E96">50mm</text>
  <text x="308" y="400" font-family="'Courier New', monospace" font-size="9" fill="#A39E96">70mm</text>
  <text x="358" y="400" font-family="'Courier New', monospace" font-size="9" fill="#A39E96">85mm</text>
  <text x="405" y="400" font-family="'Courier New', monospace" font-size="9" fill="#A39E96">100mm</text>
  <text x="455" y="400" font-family="'Courier New', monospace" font-size="9" fill="#A39E96">135mm</text>
  <text x="505" y="400" font-family="'Courier New', monospace" font-size="9" fill="#A39E96">200mm</text>
  <text x="555" y="400" font-family="'Courier New', monospace" font-size="9" fill="#A39E96">400mm</text>

  <!-- Your Glass section -->
  <text x="60" y="470" font-family="Georgia, serif" font-size="28" fill="#1A1A1A">Your Glass</text>
  <text x="210" y="470" font-family="system-ui, sans-serif" font-size="14" fill="#A39E96">ranked by usage</text>

  <!-- Gear bars -->
  <text x="60" y="510" font-family="'Courier New', monospace" font-size="12" fill="#1A1A1A">FE 35mm f/1.4 GM</text>
  <text x="1060" y="510" font-family="'Courier New', monospace" font-size="11" fill="#A39E96" text-anchor="end">4,231</text>
  <rect x="60" y="518" width="1080" height="8" rx="4" fill="#EDE9E3"/>
  <rect x="60" y="518" width="1080" height="8" rx="4" fill="#E8553D"/>

  <text x="60" y="555" font-family="'Courier New', monospace" font-size="12" fill="#1A1A1A">FE 24-70mm f/2.8 GM II</text>
  <text x="1060" y="555" font-family="'Courier New', monospace" font-size="11" fill="#A39E96" text-anchor="end">2,944</text>
  <rect x="60" y="563" width="1080" height="8" rx="4" fill="#EDE9E3"/>
  <rect x="60" y="563" width="750" height="8" rx="4" fill="#1A1A1A"/>

  <text x="60" y="600" font-family="'Courier New', monospace" font-size="12" fill="#1A1A1A">FE 85mm f/1.4 GM</text>
  <text x="1060" y="600" font-family="'Courier New', monospace" font-size="11" fill="#A39E96" text-anchor="end">1,872</text>
  <rect x="60" y="608" width="1080" height="8" rx="4" fill="#EDE9E3"/>
  <rect x="60" y="608" width="478" height="8" rx="4" fill="#1A1A1A"/>

  <text x="60" y="645" font-family="'Courier New', monospace" font-size="12" fill="#1A1A1A">Sigma 35mm f/1.4 Art</text>
  <text x="1060" y="645" font-family="'Courier New', monospace" font-size="11" fill="#A39E96" text-anchor="end">1,203</text>
  <rect x="60" y="653" width="1080" height="8" rx="4" fill="#EDE9E3"/>
  <rect x="60" y="653" width="307" height="8" rx="4" fill="#1A1A1A"/>
</svg>
